<script>
document.addEventListener('DOMContentLoaded', function() {
    // Control mobile menu
    const menuButton = document.getElementById('mobile-menu-button');
    const menuPanel = document.getElementById('mobile-menu-panel');
    const openIcon = document.getElementById('icon-menu-open');
    const closeIcon = document.getElementById('icon-menu-close');
    const mobileMenuClose = document.getElementById('mobile-menu-close');

    const openMenu = () => {
        if (menuPanel) menuPanel.classList.add('open');
        if (menuButton) menuButton.setAttribute('aria-expanded', 'true');
        if (openIcon) openIcon.classList.add('hidden');
        if (closeIcon) closeIcon.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    };

    const closeMenu = () => {
        if (menuPanel) menuPanel.classList.remove('open');
        if (menuButton) menuButton.setAttribute('aria-expanded', 'false');
        if (openIcon) openIcon.classList.remove('hidden');
        if (closeIcon) closeIcon.classList.add('hidden');
        document.body.style.overflow = '';
    };

    if (menuButton) {
        menuButton.addEventListener('click', () => {
            const isExpanded = menuButton.getAttribute('aria-expanded') === 'true';
            isExpanded ? closeMenu() : openMenu();
        });
    }

    if (mobileMenuClose) {
        mobileMenuClose.addEventListener('click', closeMenu);
    }

    if (menuPanel) {
        menuPanel.addEventListener('click', (e) => {
            if (e.target === menuPanel) closeMenu();
        });
    }

    // Submenu logic
    const submenuToggles = document.querySelectorAll('.mobile-submenu-toggle');
    submenuToggles.forEach(toggle => {
        toggle.addEventListener('click', () => {
            const content = document.getElementById(toggle.getAttribute('aria-controls'));
            const icon = toggle.querySelector('.mobile-submenu-icon');
            const isExpanded = toggle.getAttribute('aria-expanded') === 'true';

            toggle.setAttribute('aria-expanded', (!isExpanded).toString());
            if (content) content.style.maxHeight = isExpanded ? '0' : `${content.scrollHeight}px`;
            if (icon) icon.style.transform = isExpanded ? 'rotate(0deg)' : 'rotate(180deg)';
        });
    });

    // Close mobile menu when a link is clicked
    const menuLinks = document.querySelectorAll('#mobile-menu-panel a[href]');
    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            setTimeout(closeMenu, 100);
        });
    });

    // Desktop dropdown toggle
    const dropdownToggle = document.querySelector('.nav-links .relative button[aria-haspopup="true"]');
    const dropdownMenu = document.querySelector('.dropdown-menu');
    const dropdownIcon = dropdownToggle?.querySelector('.fa-chevron-down');

    const openDesktopDropdown = () => {
        if (dropdownMenu) dropdownMenu.classList.add('dropdown-open');
        if (dropdownToggle) dropdownToggle.setAttribute('aria-expanded', 'true');
        if (dropdownIcon) dropdownIcon.style.transform = 'rotate(180deg)';
    };

    const closeDesktopDropdown = () => {
        if (dropdownMenu) dropdownMenu.classList.remove('dropdown-open');
        if (dropdownToggle) dropdownToggle.setAttribute('aria-expanded', 'false');
        if (dropdownIcon) dropdownIcon.style.transform = 'rotate(0deg)';
    };

    if (dropdownToggle) {
        dropdownToggle.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            const isExpanded = dropdownToggle.getAttribute('aria-expanded') === 'true';
            isExpanded ? closeDesktopDropdown() : openDesktopDropdown();
        });
    }

    document.addEventListener('click', (event) => {
        if (!dropdownMenu || !dropdownToggle) return;
        if (dropdownToggle.contains(event.target) || dropdownMenu.contains(event.target)) return;
        closeDesktopDropdown();
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeMenu();
            closeDesktopDropdown();
        }
    });
});
</script>
