<script>
document.addEventListener('DOMContentLoaded', function() {
    // Control mobile menu
    const menuButton = document.getElementById('mobile-menu-button');
    const menuPanel = document.getElementById('mobile-menu-panel');
    const openIcon = document.getElementById('icon-menu-open');
    const closeIcon = document.getElementById('icon-menu-close');
    const mobileMenuClose = document.getElementById('mobile-menu-close');

    const openMenu = () => {
        if (menuPanel) menuPanel.classList.add('open');
        if (menuButton) menuButton.setAttribute('aria-expanded', 'true');
        if (openIcon) openIcon.classList.add('hidden');
        if (closeIcon) closeIcon.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    };

    const closeMenu = () => {
        if (menuPanel) menuPanel.classList.remove('open');
        if (menuButton) menuButton.setAttribute('aria-expanded', 'false');
        if (openIcon) openIcon.classList.remove('hidden');
        if (closeIcon) closeIcon.classList.add('hidden');
        document.body.style.overflow = '';
    };

    if (menuButton) {
        menuButton.addEventListener('click', () => {
            const isExpanded = menuButton.getAttribute('aria-expanded') === 'true';
            isExpanded ? closeMenu() : openMenu();
        });
    }

    if (mobileMenuClose) {
        mobileMenuClose.addEventListener('click', closeMenu);
    }

    if (menuPanel) {
        menuPanel.addEventListener('click', (e) => {
            if (e.target === menuPanel) closeMenu();
        });
    }

    // Close mobile menu when a link is clicked
    const menuLinks = document.querySelectorAll('#mobile-menu-panel a[href]');
    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            setTimeout(closeMenu, 100);
        });
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            closeMenu();
        }
    });

    const normalizePage = (pathname) => {
        const cleaned = pathname.replace(/\/+$/, '');
        const slug = cleaned.split('/').pop();
        return slug || 'index.html';
    };

    const highlightActiveLink = () => {
        const currentPage = normalizePage(window.location.pathname);
        const candidates = document.querySelectorAll('.nav-links a, .mobile-menu-item');
        candidates.forEach(link => {
            const href = link.getAttribute('href');
            if (!href) {
                link.removeAttribute('aria-current');
                return;
            }

            try {
                const linkUrl = new URL(href, window.location.origin);
                const linkPage = normalizePage(linkUrl.pathname);
                if (linkPage === currentPage) {
                    link.setAttribute('aria-current', 'page');
                } else {
                    link.removeAttribute('aria-current');
                }
            } catch {
                link.removeAttribute('aria-current');
            }
        });
    };

    highlightActiveLink();
    window.addEventListener('popstate', highlightActiveLink);
});
</script>
